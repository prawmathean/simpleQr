<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR & Barcode Generator</title>
  <meta name="description" content="Generate QR codes and barcodes instantly as you type. Customize colors, shapes, and download or copy your codes." />

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181b;
      --surface2: #222226;
      --border: #2e2e34;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6d28d9;
      --accent-light: #7c3aed;
      --radius: 10px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      gap: 28px;
      min-height: 100vh;
    }

    header { text-align: center; }
    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    header p { color: var(--muted); margin-top: 4px; font-size: 13px; }

    .container {
      width: 100%;
      max-width: 820px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
    }

    @media (max-width: 660px) {
      .container { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
    }
    .tab {
      flex: 1;
      padding: 7px 12px;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .tab.active { background: var(--accent); color: #fff; }

    .input-wrap { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }

    .preview-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--surface2);
      border-radius: 8px;
      min-height: 200px;
      padding: 20px;
    }

    #qr-container canvas, #qr-container svg { border-radius: 6px; }
    #barcode-container svg { max-width: 100%; height: auto; border-radius: 6px; }

    .placeholder-text { color: var(--muted); font-size: 13px; }

    .actions { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #27272a;
      color: #e4e4e7;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .custom-panel { display: flex; flex-direction: column; gap: 14px; }
    .custom-panel h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .color-input-wrap { display: flex; flex-direction: column; gap: 5px; }

    input[type="color"] {
      -webkit-appearance: none;
      width: 100%;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      cursor: pointer;
      padding: 3px;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

    .dot-styles { display: flex; gap: 6px; flex-wrap: wrap; }
    .dot-style-btn {
      flex: 1;
      min-width: 54px;
      padding: 7px 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .dot-style-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .dot-style-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

    .corner-styles { display: flex; gap: 6px; }
    .corner-btn {
      flex: 1;
      padding: 8px 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .corner-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .corner-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

    .logo-uploader { display: flex; align-items: center; gap: 8px; }
    .logo-uploader input[type="file"] { display: none; }
    .logo-uploader label.upload-btn {
      padding: 7px 12px;
      border: 1px dashed var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .logo-uploader label.upload-btn:hover { border-color: var(--accent); color: var(--text); }
    #logo-clear {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
    }
    #logo-clear:hover { background: var(--border); }

    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .slider-label { display: flex; justify-content: space-between; }
    .slider-label span { font-size: 12px; color: var(--muted); }

    .error-msg { color: #f87171; font-size: 12px; display: none; }

    hr { border: none; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <header>
    <h1>QR &amp; Barcode Generator</h1>
    <p>Type below — preview updates live</p>
  </header>

  <div class="container">

    <!-- Left: Input + Preview -->
    <div class="panel">
      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-qr" role="tab" onclick="switchMode('qr')">QR Code</button>
        <button class="tab" id="tab-bar" role="tab" onclick="switchMode('bar')">Barcode</button>
      </div>

      <div id="qr-inputs" class="input-wrap">
        <label for="qr-text">Content</label>
        <textarea id="qr-text" placeholder="Enter URL, text, email, anything…" oninput="onQrInput()"></textarea>
      </div>

      <div id="bar-inputs" style="display:none; flex-direction:column; gap:12px;">
        <div class="input-wrap">
          <label for="bar-text">Content</label>
          <input type="text" id="bar-text" placeholder="Enter value…" oninput="onBarInput()" />
        </div>
        <div class="input-wrap">
          <label for="bar-format">Format</label>
          <select id="bar-format" onchange="onBarInput()">
            <option value="CODE128">CODE128 (universal)</option>
            <option value="EAN13">EAN-13</option>
            <option value="UPC">UPC-A</option>
            <option value="EAN8">EAN-8</option>
            <option value="CODE39">CODE39</option>
            <option value="ITF14">ITF-14</option>
            <option value="MSI">MSI</option>
            <option value="pharmacode">Pharmacode</option>
          </select>
        </div>
        <p class="error-msg" id="bar-error">Invalid value for selected format.</p>
      </div>

      <div class="preview-area" id="preview-area">
        <div id="qr-container"></div>
        <div id="barcode-container" style="display:none; width:100%; text-align:center;">
          <svg id="barcode-svg"></svg>
        </div>
        <p class="placeholder-text" id="placeholder">Your code will appear here</p>
      </div>

      <div class="actions">
        <button class="btn" id="btn-copy" onclick="copyImage()" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
        <button class="btn primary" id="btn-download" onclick="downloadImage()" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG
        </button>
      </div>
    </div>

    <!-- Right: Customization -->
    <div class="panel custom-panel" id="custom-sidebar">
      <h3>Customise QR</h3>

      <div>
        <label style="display:block;margin-bottom:8px;">Colors</label>
        <div class="color-row">
          <div class="color-input-wrap">
            <label for="color-dark">Foreground</label>
            <input type="color" id="color-dark" value="#000000" oninput="onQrInput()" />
          </div>
          <div class="color-input-wrap">
            <label for="color-light">Background</label>
            <input type="color" id="color-light" value="#ffffff" oninput="onQrInput()" />
          </div>
        </div>
      </div>

      <hr />

      <div>
        <label style="display:block;margin-bottom:8px;">Dot shape</label>
        <div class="dot-styles" id="dot-styles">
          <button class="dot-style-btn active" onclick="setDotStyle(this,'square')">■ Square</button>
          <button class="dot-style-btn" onclick="setDotStyle(this,'dots')">● Dots</button>
          <button class="dot-style-btn" onclick="setDotStyle(this,'rounded')">◉ Round</button>
          <button class="dot-style-btn" onclick="setDotStyle(this,'classy')">◆ Classy</button>
          <button class="dot-style-btn" onclick="setDotStyle(this,'classy-rounded')">◈ C.Round</button>
          <button class="dot-style-btn" onclick="setDotStyle(this,'extra-rounded')">⬡ X.Round</button>
        </div>
      </div>

      <hr />

      <div>
        <label style="display:block;margin-bottom:8px;">Corner style</label>
        <div class="corner-styles" id="corner-styles">
          <button class="corner-btn active" onclick="setCornerStyle(this,'square')">Square</button>
          <button class="corner-btn" onclick="setCornerStyle(this,'extra-rounded')">Rounded</button>
          <button class="corner-btn" onclick="setCornerStyle(this,'dot')">Dot</button>
        </div>
      </div>

      <hr />

      <div>
        <label style="display:block;margin-bottom:8px;">Logo / Image</label>
        <div class="logo-uploader">
          <input type="file" id="logo-input" accept="image/*" onchange="onLogoChange()" />
          <label class="upload-btn" for="logo-input">+ Upload logo</label>
          <button id="logo-clear" onclick="clearLogo()">✕ Clear</button>
        </div>
      </div>

      <hr />

      <div>
        <div class="slider-label">
          <label>Size</label>
          <span id="size-val">256 px</span>
        </div>
        <input type="range" id="qr-size" min="128" max="512" step="16" value="256"
               oninput="document.getElementById('size-val').textContent=this.value+' px'; onQrInput()" />
      </div>

      <hr />

      <div class="input-wrap">
        <label for="ec-level">Error correction</label>
        <select id="ec-level" onchange="onQrInput()">
          <option value="L">L — Low (7%)</option>
          <option value="M" selected>M — Medium (15%)</option>
          <option value="Q">Q — Quartile (25%)</option>
          <option value="H">H — High (30%)</option>
        </select>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

<script>
  let mode = 'qr';
  let qrCode = null;
  let hasContent = false;
  let logoDataUrl = null;
  let dotStyle = 'square';
  let cornerStyle = 'square';
  let debounceTimer = null;

  function switchMode(m) {
    mode = m;
    document.getElementById('tab-qr').classList.toggle('active', m === 'qr');
    document.getElementById('tab-bar').classList.toggle('active', m === 'bar');
    document.getElementById('qr-inputs').style.display   = m === 'qr'  ? 'flex' : 'none';
    document.getElementById('bar-inputs').style.display  = m === 'bar' ? 'flex' : 'none';
    document.getElementById('custom-sidebar').style.display = m === 'qr' ? 'flex' : 'none';
    document.getElementById('qr-container').style.display      = m === 'qr'  ? '' : 'none';
    document.getElementById('barcode-container').style.display = m === 'bar' ? '' : 'none';
    setButtons(false);
    showPlaceholder(true);
    if (m === 'qr') {
      const v = document.getElementById('qr-text').value;
      if (v.trim()) renderQr(v);
    } else {
      const v = document.getElementById('bar-text').value;
      if (v.trim()) renderBar(v);
    }
  }

  function onQrInput() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const val = document.getElementById('qr-text').value.trim();
      if (!val) { clearQr(); return; }
      renderQr(val);
    }, 120);
  }

  function onBarInput() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const val = document.getElementById('bar-text').value.trim();
      if (!val) { clearBar(); return; }
      renderBar(val);
    }, 120);
  }

  function getQrOptions(value) {
    const size = parseInt(document.getElementById('qr-size').value);
    const dark = document.getElementById('color-dark').value;
    const light = document.getElementById('color-light').value;
    const ec = document.getElementById('ec-level').value;
    const cornerSquareMap = { 'square': 'square', 'extra-rounded': 'extra-rounded', 'dot': 'dot' };
    const cornerDotMap    = { 'square': 'square', 'extra-rounded': 'dot', 'dot': 'dot' };
    return {
      width: size, height: size,
      type: 'canvas',
      data: value,
      image: logoDataUrl || undefined,
      qrOptions: { errorCorrectionLevel: ec },
      dotsOptions: { color: dark, type: dotStyle },
      backgroundOptions: { color: light },
      imageOptions: { crossOrigin: 'anonymous', margin: 6, imageSize: 0.3 },
      cornersSquareOptions: { type: cornerSquareMap[cornerStyle], color: dark },
      cornersDotOptions:    { type: cornerDotMap[cornerStyle],    color: dark }
    };
  }

  function renderQr(value) {
    const container = document.getElementById('qr-container');
    if (!qrCode) {
      qrCode = new QRCodeStyling(getQrOptions(value));
      qrCode.append(container);
    } else {
      qrCode.update(getQrOptions(value));
    }
    showPlaceholder(false);
    setButtons(true);
  }

  function clearQr() {
    if (qrCode) {
      document.getElementById('qr-container').innerHTML = '';
      qrCode = null;
    }
    showPlaceholder(true);
    setButtons(false);
  }

  function renderBar(value) {
    const format = document.getElementById('bar-format').value;
    const errEl  = document.getElementById('bar-error');
    try {
      JsBarcode('#barcode-svg', value, {
        format,
        lineColor: '#e4e4e7',
        background: '#18181b',
        width: 2,
        height: 80,
        displayValue: true,
        font: 'Inter, system-ui, sans-serif',
        textAlign: 'center',
        textPosition: 'bottom',
        textMargin: 6,
        fontSize: 13,
        margin: 12
      });
      errEl.style.display = 'none';
      showPlaceholder(false);
      setButtons(true);
    } catch(e) {
      errEl.style.display = 'block';
      showPlaceholder(false);
      setButtons(false);
    }
  }

  function clearBar() {
    document.getElementById('barcode-svg').innerHTML = '';
    showPlaceholder(true);
    setButtons(false);
    document.getElementById('bar-error').style.display = 'none';
  }

  function showPlaceholder(show) {
    document.getElementById('placeholder').style.display = show ? '' : 'none';
  }

  function setButtons(enabled) {
    document.getElementById('btn-copy').disabled = !enabled;
    document.getElementById('btn-download').disabled = !enabled;
    hasContent = enabled;
  }

  function setDotStyle(el, style) {
    dotStyle = style;
    document.querySelectorAll('.dot-style-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    onQrInput();
  }

  function setCornerStyle(el, style) {
    cornerStyle = style;
    document.querySelectorAll('.corner-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    onQrInput();
  }

  function onLogoChange() {
    const file = document.getElementById('logo-input').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { logoDataUrl = e.target.result; onQrInput(); };
    reader.readAsDataURL(file);
  }

  function clearLogo() {
    logoDataUrl = null;
    document.getElementById('logo-input').value = '';
    onQrInput();
  }

  async function getCanvas() {
    if (mode === 'qr') {
      return document.querySelector('#qr-container canvas');
    } else {
      const svg = document.getElementById('barcode-svg');
      const svgData = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const bb = svg.getBoundingClientRect();
          const c = document.createElement('canvas');
          c.width  = bb.width  || 400;
          c.height = bb.height || 150;
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          URL.revokeObjectURL(url);
          resolve(c);
        };
        img.src = url;
      });
    }
  }

  async function copyImage() {
    if (!hasContent) return;
    try {
      let blob;
      if (mode === 'qr') {
        blob = await qrCode.getRawData('png');
      } else {
        const canvas = await getCanvas();
        blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      }
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      showToast('Copied to clipboard ✓');
    } catch(e) {
      showToast('Copy failed — try Download instead');
    }
  }

  async function downloadImage() {
    if (!hasContent) return;
    try {
      if (mode === 'qr') {
        qrCode.download({ name: 'qr-code', extension: 'png' });
      } else {
        const canvas = await getCanvas();
        const a = document.createElement('a');
        a.download = 'barcode.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      }
      showToast('Downloaded ✓');
    } catch(e) {
      showToast('Download failed');
    }
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
