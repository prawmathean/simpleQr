<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR & Barcode Generator</title>
  <meta name="description" content="Generate QR codes and barcodes instantly as you type. Customize colors, shapes, download or copy." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    /* ── Tokens ─────────────────────────────────────── */
    :root {
      --bg:       #f4f0e8;
      --paper:    #fdfcf9;
      --paper2:   #f0ece3;
      --border:   #ccc7bb;
      --ink:      #1e1b16;
      --ink2:     #6b6558;
      --rust:     #c0522a;
      --rust-dk:  #a8431f;
      --font-head: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
      --r: 6px;
      --transition: 0.18s ease;
    }

    [data-theme="dark"] {
      --bg:      #181511;
      --paper:   #211e19;
      --paper2:  #2a2720;
      --border:  #3d3930;
      --ink:     #ede8de;
      --ink2:    #9a9186;
      --rust:    #d9653b;
      --rust-dk: #e07352;
    }

    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Layout shell ───────────────────────────────── */
    .shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Top bar ────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 0 20px;
      border-bottom: 2px solid var(--ink);
      gap: 12px;
    }

    .site-name {
      font-family: var(--font-head);
      font-size: 26px;
      letter-spacing: -0.5px;
      color: var(--ink);
      line-height: 1;
    }

    .site-sub {
      font-size: 12px;
      color: var(--ink2);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      background: var(--paper);
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--ink2);
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
    }
    .theme-toggle:hover { border-color: var(--rust); color: var(--ink); }
    .theme-toggle .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--rust);
      flex-shrink: 0;
    }

    /* ── Main grid ──────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 0;
      border: 1.5px solid var(--border);
      border-top: none;
      border-bottom: 2px solid var(--ink);
    }

    @media (max-width: 640px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: 1.5px solid var(--border); }
    }

    /* ── Left column ─────────────────────────────────── */
    .left {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-right: 1.5px solid var(--border);
    }

    /* Tabs — pill strip style */
    .tabs {
      display: inline-flex;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      width: fit-content;
    }
    .tab {
      padding: 7px 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.04em;
      background: none;
      border: none;
      color: var(--ink2);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .tab + .tab { border-left: 1.5px solid var(--border); }
    .tab.active { background: var(--rust); color: #fff; }
    .tab:hover:not(.active) { background: var(--paper2); color: var(--ink); }

    /* Field label */
    .field-label {
      display: block;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--ink2);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    textarea, input[type="text"], select {
      width: 100%;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
      resize: vertical;
    }
    textarea { min-height: 76px; }
    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: var(--rust);
    }
    select { cursor: pointer; }
    select option { background: var(--paper); color: var(--ink); }

    .bar-inputs { display: none; flex-direction: column; gap: 12px; }

    /* Preview box */
    .preview {
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background var(--transition);
      overflow: hidden;
    }
    #qr-container canvas, #qr-container svg { display: block; border-radius: 4px; }
    #barcode-svg { max-width: 100%; height: auto; }

    .preview-placeholder {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--ink2);
    }

    /* Actions */
    .actions { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.04em;
      border-radius: var(--r);
      border: 1.5px solid var(--border);
      background: var(--paper);
      color: var(--ink2);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn:hover:not(:disabled) { border-color: var(--ink2); color: var(--ink); background: var(--paper2); }
    .btn.primary {
      background: var(--rust);
      border-color: var(--rust);
      color: #fff;
    }
    .btn.primary:hover:not(:disabled) { background: var(--rust-dk); border-color: var(--rust-dk); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .error-note {
      font-size: 12px;
      font-family: var(--font-mono);
      color: #c0392b;
      display: none;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-title {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--ink2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    hr.divider { border: none; border-top: 1px solid var(--border); }

    /* Section label in sidebar */
    .sec-label {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--ink2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Color pickers */
    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .color-cell { display: flex; flex-direction: column; gap: 5px; }

    input[type="color"] {
      -webkit-appearance: none;
      width: 100%;
      height: 32px;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      background: var(--paper);
      cursor: pointer;
      padding: 2px;
      transition: border-color var(--transition);
    }
    input[type="color"]:hover { border-color: var(--rust); }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

    /* Option grids */
    .opt-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .opt-btn {
      padding: 5px 9px;
      font-size: 11px;
      font-family: var(--font-mono);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      background: var(--paper);
      color: var(--ink2);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .opt-btn:hover:not(.on) { border-color: var(--ink2); color: var(--ink); }
    .opt-btn.on { background: var(--rust); border-color: var(--rust); color: #fff; }

    /* Logo row */
    .logo-row { display: flex; align-items: center; gap: 6px; }
    input[type="file"] { display: none; }
    .file-btn {
      display: inline-block;
      padding: 6px 10px;
      font-size: 11px;
      font-family: var(--font-mono);
      border: 1.5px dashed var(--border);
      border-radius: var(--r);
      color: var(--ink2);
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .file-btn:hover { border-color: var(--rust); color: var(--ink); }
    .clear-btn {
      padding: 6px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      background: var(--paper);
      color: var(--ink2);
      cursor: pointer;
      transition: all var(--transition);
    }
    .clear-btn:hover { border-color: var(--ink2); color: var(--ink); }

    /* Slider */
    .range-row { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .range-row span { font-size: 11px; font-family: var(--font-mono); color: var(--ink2); }
    input[type="range"] { width: 100%; accent-color: var(--rust); cursor: pointer; }

    /* ── Copy fallback overlay ──────────────────────── */
    .copy-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      padding: 20px;
    }
    .copy-box {
      background: var(--paper);
      border: 2px solid var(--ink);
      border-radius: var(--r);
      padding: 20px;
      max-width: 360px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .copy-box img { max-width: 100%; border-radius: 4px; border: 1px solid var(--border); }
    .copy-box-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink2);
      line-height: 1.5;
    }
    .copy-box-actions { display: flex; gap: 8px; }

    /* ── Toast ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--ink);
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: var(--r);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 0 0;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--ink2);
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- Top bar -->
  <header class="topbar">
    <div>
      <div class="site-name">qr &amp; barcode</div>
      <div class="site-sub">type → see → export</div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">
      <span class="dot"></span>
      <span id="theme-label">light</span>
    </button>
  </header>

  <!-- Main grid -->
  <div class="main">

    <!-- Left: input + preview -->
    <div class="left">

      <!-- Mode tabs -->
      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-qr" onclick="switchMode('qr')">QR code</button>
        <button class="tab" id="tab-bar" onclick="switchMode('bar')">Barcode</button>
      </div>

      <!-- QR input -->
      <div id="qr-inputs">
        <label class="field-label" for="qr-text">content</label>
        <textarea id="qr-text" placeholder="url, email, text, phone, anything…" oninput="onQrInput()"></textarea>
      </div>

      <!-- Barcode input -->
      <div class="bar-inputs" id="bar-inputs">
        <div>
          <label class="field-label" for="bar-text">content</label>
          <input type="text" id="bar-text" placeholder="enter a value…" oninput="onBarInput()" />
        </div>
        <div>
          <label class="field-label" for="bar-format">format</label>
          <select id="bar-format" onchange="onBarInput()">
            <option value="CODE128">CODE128  —  universal</option>
            <option value="EAN13">EAN-13</option>
            <option value="UPC">UPC-A</option>
            <option value="EAN8">EAN-8</option>
            <option value="CODE39">CODE39</option>
            <option value="ITF14">ITF-14</option>
            <option value="MSI">MSI</option>
            <option value="pharmacode">Pharmacode</option>
          </select>
        </div>
        <p class="error-note" id="bar-error">⚠ invalid value for this format</p>
      </div>

      <!-- Preview -->
      <div class="preview" id="preview">
        <div id="qr-container"></div>
        <div id="barcode-wrap" style="display:none; width:100%; text-align:center;">
          <svg id="barcode-svg"></svg>
        </div>
        <span class="preview-placeholder" id="placeholder">waiting for input…</span>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn" id="btn-copy" onclick="copyImage()" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          copy
        </button>
        <button class="btn primary" id="btn-dl" onclick="downloadImage()" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          download png
        </button>
      </div>

    </div><!-- /left -->

    <!-- Right: sidebar -->
    <div class="sidebar" id="sidebar">
      <p class="sidebar-title">QR options</p>

      <!-- Colors -->
      <div>
        <p class="sec-label">colors</p>
        <div class="color-row">
          <div class="color-cell">
            <span class="sec-label" style="margin:0;">fg</span>
            <input type="color" id="color-fg" value="#1e1b16" oninput="onQrInput()" />
          </div>
          <div class="color-cell">
            <span class="sec-label" style="margin:0;">bg</span>
            <input type="color" id="color-bg" value="#fdfcf9" oninput="onQrInput()" />
          </div>
        </div>
      </div>

      <hr class="divider" />

      <!-- Dot style -->
      <div>
        <p class="sec-label">dot style</p>
        <div class="opt-grid" id="dot-opts">
          <button class="opt-btn on" onclick="pickDot(this,'square')">square</button>
          <button class="opt-btn" onclick="pickDot(this,'dots')">dots</button>
          <button class="opt-btn" onclick="pickDot(this,'rounded')">rounded</button>
          <button class="opt-btn" onclick="pickDot(this,'classy')">classy</button>
          <button class="opt-btn" onclick="pickDot(this,'classy-rounded')">classy-round</button>
          <button class="opt-btn" onclick="pickDot(this,'extra-rounded')">extra-round</button>
        </div>
      </div>

      <hr class="divider" />

      <!-- Corner style -->
      <div>
        <p class="sec-label">corner style</p>
        <div class="opt-grid" id="corner-opts">
          <button class="opt-btn on" onclick="pickCorner(this,'square')">square</button>
          <button class="opt-btn" onclick="pickCorner(this,'extra-rounded')">rounded</button>
          <button class="opt-btn" onclick="pickCorner(this,'dot')">dot</button>
        </div>
      </div>

      <hr class="divider" />

      <!-- Logo -->
      <div>
        <p class="sec-label">logo overlay</p>
        <div class="logo-row">
          <input type="file" id="logo-file" accept="image/*" onchange="onLogoChange()" />
          <label class="file-btn" for="logo-file">+ upload</label>
          <button class="clear-btn" onclick="clearLogo()">✕ clear</button>
        </div>
      </div>

      <hr class="divider" />

      <!-- Size -->
      <div>
        <div class="range-row">
          <span>size</span>
          <span id="size-label">256 px</span>
        </div>
        <input type="range" id="qr-size" min="128" max="512" step="16" value="256"
               oninput="document.getElementById('size-label').textContent=this.value+' px'; onQrInput()" />
      </div>

      <hr class="divider" />

      <!-- EC level -->
      <div>
        <label class="sec-label" for="ec-level">error correction</label>
        <select id="ec-level" onchange="onQrInput()">
          <option value="L">L — low (7%)</option>
          <option value="M" selected>M — medium (15%)</option>
          <option value="Q">Q — quartile (25%)</option>
          <option value="H">H — high (30%)</option>
        </select>
      </div>

    </div><!-- /sidebar -->

  </div><!-- /main -->

  <footer class="footer">
    <span>qr-code-styling · jsbarcode</span>
    <span id="char-count"></span>
  </footer>

</div><!-- /shell -->

<div class="toast" id="toast"></div>

<script>
  /* ── State ───────────────────────────────── */
  let mode = 'qr';
  let qrCode = null;
  let hasContent = false;
  let logoDataUrl = null;
  let dotStyle = 'square';
  let cornerStyle = 'square';
  let debTimer = null;
  let isDark = false;

  /* ── Theme ───────────────────────────────── */
  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-label').textContent = isDark ? 'dark' : 'light';
    // Update QR bg/fg color defaults only if user hasn't manually changed them
    // Just re-render current QR so it picks up new defaults if the user typed something
    if (mode === 'qr') onQrInput();
  }

  /* ── Mode ────────────────────────────────── */
  function switchMode(m) {
    mode = m;
    document.getElementById('tab-qr').classList.toggle('active', m === 'qr');
    document.getElementById('tab-bar').classList.toggle('active', m === 'bar');
    document.getElementById('qr-inputs').style.display   = m === 'qr'  ? ''     : 'none';
    document.getElementById('bar-inputs').style.display  = m === 'bar' ? 'flex' : 'none';
    document.getElementById('sidebar').style.display     = m === 'qr'  ? ''     : 'none';
    document.getElementById('qr-container').style.display      = m === 'qr'  ? '' : 'none';
    document.getElementById('barcode-wrap').style.display      = m === 'bar' ? '' : 'none';
    setButtons(false);
    showPH(true);
    if (m === 'qr' && document.getElementById('qr-text').value.trim())  onQrInput();
    if (m === 'bar' && document.getElementById('bar-text').value.trim()) onBarInput();
  }

  /* ── QR ──────────────────────────────────── */
  function onQrInput() {
    clearTimeout(debTimer);
    const el = document.getElementById('qr-text');
    const v = el.value;
    updateCharCount(v.length);
    debTimer = setTimeout(() => {
      const t = v.trim();
      if (!t) { clearQr(); return; }
      renderQr(t);
    }, 120);
  }

  function qrOpts(val) {
    const size = +document.getElementById('qr-size').value;
    const fg   = document.getElementById('color-fg').value;
    const bg   = document.getElementById('color-bg').value;
    const ec   = document.getElementById('ec-level').value;
    const csMap = { square: 'square', 'extra-rounded': 'extra-rounded', dot: 'dot' };
    const cdMap = { square: 'square', 'extra-rounded': 'dot', dot: 'dot' };
    return {
      width: size, height: size,
      type: 'canvas',
      data: val,
      image: logoDataUrl || undefined,
      qrOptions: { errorCorrectionLevel: ec },
      dotsOptions:         { color: fg, type: dotStyle },
      backgroundOptions:   { color: bg },
      imageOptions:        { crossOrigin: 'anonymous', margin: 6, imageSize: 0.28 },
      cornersSquareOptions: { type: csMap[cornerStyle], color: fg },
      cornersDotOptions:    { type: cdMap[cornerStyle], color: fg }
    };
  }

  function renderQr(val) {
    const wrap = document.getElementById('qr-container');
    if (!qrCode) {
      qrCode = new QRCodeStyling(qrOpts(val));
      qrCode.append(wrap);
    } else {
      qrCode.update(qrOpts(val));
    }
    showPH(false);
    setButtons(true);
  }

  function clearQr() {
    if (qrCode) { document.getElementById('qr-container').innerHTML = ''; qrCode = null; }
    showPH(true); setButtons(false); updateCharCount(0);
  }

  /* ── Barcode ─────────────────────────────── */
  function onBarInput() {
    clearTimeout(debTimer);
    const v = document.getElementById('bar-text').value;
    debTimer = setTimeout(() => {
      const t = v.trim();
      if (!t) { clearBar(); return; }
      renderBar(t);
    }, 120);
  }

  function renderBar(val) {
    const fmt  = document.getElementById('bar-format').value;
    const errEl = document.getElementById('bar-error');
    const isLight = document.documentElement.getAttribute('data-theme') !== 'dark';
    try {
      JsBarcode('#barcode-svg', val, {
        format: fmt,
        lineColor: isLight ? '#1e1b16' : '#ede8de',
        background: isLight ? '#fdfcf9' : '#211e19',
        width: 2, height: 80,
        displayValue: true,
        font: 'DM Mono, Courier New, monospace',
        textAlign: 'center',
        textPosition: 'bottom',
        textMargin: 5,
        fontSize: 12,
        margin: 14
      });
      errEl.style.display = 'none';
      showPH(false); setButtons(true);
    } catch(e) {
      errEl.style.display = 'block';
      showPH(false); setButtons(false);
    }
  }

  function clearBar() {
    document.getElementById('barcode-svg').innerHTML = '';
    document.getElementById('bar-error').style.display = 'none';
    showPH(true); setButtons(false);
  }

  /* ── Customise ───────────────────────────── */
  function pickDot(el, style) {
    dotStyle = style;
    document.querySelectorAll('#dot-opts .opt-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    onQrInput();
  }

  function pickCorner(el, style) {
    cornerStyle = style;
    document.querySelectorAll('#corner-opts .opt-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    onQrInput();
  }

  function onLogoChange() {
    const f = document.getElementById('logo-file').files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = e => { logoDataUrl = e.target.result; onQrInput(); };
    r.readAsDataURL(f);
  }

  function clearLogo() {
    logoDataUrl = null;
    document.getElementById('logo-file').value = '';
    onQrInput();
  }

  /* ── Export ──────────────────────────────── */
  async function barCanvas() {
    const svg = document.getElementById('barcode-svg');
    const data = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([data], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    return new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const bb = svg.getBoundingClientRect();
        const c  = document.createElement('canvas');
        c.width  = bb.width  || 400;
        c.height = bb.height || 140;
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        URL.revokeObjectURL(url);
        res(c);
      };
      img.src = url;
    });
  }

  /* Get a proper Blob from whatever is currently rendered */
  async function getBlob() {
    if (mode === 'qr') {
      // Pull directly from the canvas element — always a real Blob, never a Buffer
      const canvas = document.querySelector('#qr-container canvas');
      if (canvas) return new Promise(res => canvas.toBlob(res, 'image/png'));
      // Fallback to library method
      return qrCode.getRawData('png');
    } else {
      const c = await barCanvas();
      return new Promise(res => c.toBlob(res, 'image/png'));
    }
  }

  async function copyImage() {
    if (!hasContent) return;
    let blob;
    try { blob = await getBlob(); } catch(e) { toast('could not read image data'); return; }

    // Try modern clipboard API (needs HTTPS or localhost; blocked on file://)
    if (typeof ClipboardItem !== 'undefined' && navigator.clipboard?.write) {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast('copied ✓');
        return;
      } catch(e) {
        // Permission denied or not a secure context — fall through to modal
      }
    }

    // Fallback: show the image in an overlay so user can right-click → Copy Image
    showCopyFallback(blob);
  }

  function showCopyFallback(blob) {
    const url = URL.createObjectURL(blob);
    const overlay = document.createElement('div');
    overlay.className = 'copy-overlay';
    overlay.innerHTML = `
      <div class="copy-box">
        <img src="${url}" alt="generated code" />
        <p class="copy-box-label">clipboard access is blocked on local files.<br>right-click the image above → <strong>copy image</strong></p>
        <div class="copy-box-actions">
          <button class="btn primary" style="flex:1" onclick="this.closest('.copy-overlay').remove(); URL.revokeObjectURL('${url}')">close</button>
        </div>
      </div>`;
    overlay.addEventListener('click', e => {
      if (e.target === overlay) { overlay.remove(); URL.revokeObjectURL(url); }
    });
    document.body.appendChild(overlay);
  }

  async function downloadImage() {
    if (!hasContent) return;
    try {
      if (mode === 'qr') {
        qrCode.download({ name: 'qr-code', extension: 'png' });
      } else {
        const c = await barCanvas();
        const a = document.createElement('a');
        a.download = 'barcode.png';
        a.href = c.toDataURL('image/png');
        a.click();
      }
      toast('downloaded ✓');
    } catch(e) { toast('download failed'); }
  }

  /* ── Helpers ─────────────────────────────── */
  function showPH(v) { document.getElementById('placeholder').style.display = v ? '' : 'none'; }

  function setButtons(on) {
    document.getElementById('btn-copy').disabled = !on;
    document.getElementById('btn-dl').disabled   = !on;
    hasContent = on;
  }

  function updateCharCount(n) {
    const el = document.getElementById('char-count');
    el.textContent = n > 0 ? n + ' chars' : '';
  }

  let toastT;
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
